name: CD — Deploy to AWS Lambda

on:
  push:
    branches: [main]
    paths:
      - 'lambda_folder/**'
      - '.github/workflows/cd.yml'
    workflow_run:
      workflows: ["ML Training Pipeline"]
      types: [completed]
  workflow_run:                          # ← AÑADIR ESTO
    workflows: ["ML Training Pipeline"]  # nombre exacto del train.yml
    types: [completed]
    branches: [main]

env:
  AWS_REGION:     us-east-1
  ECR_REPOSITORY: mlops-lambda
  LAMBDA_NAME:    mlops-pipeline-function

jobs:
  deploy:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Instalar herramientas de compilación
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build, tag y push imagen a ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --output type=docker \
            --build-arg PYTHON_VERSION=$(cat .python-version) \
            -f lambda_folder/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Actualizar Lambda con nueva imagen
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_NAME }} \
            --image-uri ${{ steps.build-image.outputs.image }} \
            --region ${{ env.AWS_REGION }}

      - name: Esperar que Lambda termine de actualizar
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda actualizada correctamente"
        - name: Ensure Lambda Function URL exists and expose it
          run: |
            set -e
            EXISTING=$(aws lambda get-function-url-config \
              --function-name ${{ env.LAMBDA_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --query 'FunctionUrl' --output text 2>/dev/null || echo "NONE")
            if [ "$EXISTING" = "NONE" ]; then
              echo "Creating Lambda Function URL..."
              aws lambda add-permission \
                --function-name ${{ env.LAMBDA_NAME }} \
                --statement-id FunctionURLAllowPublicAccess \
                --action lambda:InvokeFunctionUrl \
                --principal "*" \
                --function-url-auth-type NONE \
                --region ${{ env.AWS_REGION }} || true

              aws lambda create-function-url-config \
                --function-name ${{ env.LAMBDA_NAME }} \
                --auth-type NONE \
                --cors '{"AllowOrigins":["*"],"AllowMethods":["POST","GET"],"AllowHeaders":["*"]}' \
                --region ${{ env.AWS_REGION }}
            fi

            URL=$(aws lambda get-function-url-config \
              --function-name ${{ env.LAMBDA_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --query 'FunctionUrl' --output text)

            echo "LAMBDA_URL=$URL" >> $GITHUB_ENV
            echo "🌐 Lambda Function URL: $URL"
      - name: Habilitar Lambda Function URL (si no existe)
        run: |
          # Verificar si ya existe la Function URL
          EXISTING=$(aws lambda get-function-url-config \
            --function-name ${{ env.LAMBDA_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'FunctionUrl' --output text 2>/dev/null || echo "NONE")

          if [ "$EXISTING" = "NONE" ]; then
            echo "Creando Lambda Function URL..."
            aws lambda add-permission \
              --function-name ${{ env.LAMBDA_NAME }} \
              --statement-id FunctionURLAllowPublicAccess \
              --action lambda:InvokeFunctionUrl \
              --principal "*" \
              --function-url-auth-type NONE \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true

            aws lambda create-function-url-config \
              --function-name ${{ env.LAMBDA_NAME }} \
              --auth-type NONE \
              --cors '{"AllowOrigins":["*"],"AllowMethods":["POST","GET"],"AllowHeaders":["*"]}' \
              --region ${{ env.AWS_REGION }}
          fi

          URL=$(aws lambda get-function-url-config \
            --function-name ${{ env.LAMBDA_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'FunctionUrl' --output text)

          echo "LAMBDA_URL=$URL" >> $GITHUB_ENV
          echo "🌐 Lambda Function URL: $URL"

      - name: (Opcional) Crear/actualizar CloudFront
        run: |
          # CloudFront en frente de Lambda URL añade: cache, SSL custom domain, WAF, geo-blocking
          # Para un proyecto MLOps básico, la Lambda Function URL ya tiene HTTPS nativo.
          # Añadir CloudFront si necesitas dominio propio o cache de respuestas.
          echo "Lambda URL directa: $LAMBDA_URL"
          echo "Para CloudFront, ver infra/setup_cloudfront.sh"

      - name: Resumen del deploy
        run: |
          echo "=========================================="
          echo "✅ Deploy completado"
          echo "Lambda:   ${{ env.LAMBDA_NAME }}"
          echo "URL:      $LAMBDA_URL"
          echo "Endpoint: ${LAMBDA_URL}predict (POST)"
          echo "Health:   ${LAMBDA_URL}health  (GET)"
          echo "=========================================="

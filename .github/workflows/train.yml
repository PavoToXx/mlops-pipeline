name: ML Training Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'data/**'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'

env:
  MIN_F1_SCORE: 0.85

jobs:
  train-and-evaluate:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Extraemos la versión del archivo para usarla en el CI
      - name: Read python version
        id: py-version
        run: echo "VERSION=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: Configurar Python ${{ steps.py-version.outputs.VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.py-version.outputs.VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar dataset
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        run: python src/generate_data.py

      - name: Preprocesar datos
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        run: python src/preprocess.py

      - name: Entrenar modelo con MLflow
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        run: python src/train.py

      - name: Evaluar modelo
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        run: python src/evaluate.py

      - name: Leer métricas
        id: metrics
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        run: |
          echo "f1=$(python -c "import json; print(json.load(open('reports/metrics.json'))['f1'])")" >> $GITHUB_OUTPUT
          echo "accuracy=$(python -c "import json; print(json.load(open('reports/metrics.json'))['accuracy'])")" >> $GITHUB_OUTPUT
          echo "roc_auc=$(python -c "import json; print(json.load(open('reports/metrics.json'))['roc_auc'])")" >> $GITHUB_OUTPUT

      - name: Validar threshold de métricas
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        run: |
          F1_SCORE=${{ steps.metrics.outputs.f1 }}
          echo "F1 Score: $F1_SCORE"
          if (( $(echo "$F1_SCORE < $MIN_F1_SCORE" | bc -l) )); then
            echo "❌ Model rejected: F1 score ($F1_SCORE) below threshold ($MIN_F1_SCORE)"
            exit 1
          fi
          echo "✅ Model approved: F1 score ($F1_SCORE) meets threshold"
      - name: Configurar credenciales AWS para S3
        if: github.ref == 'refs/heads/main' && (github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Subir modelo a S3
        if: github.ref == 'refs/heads/main' && (github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true')
        env:
          MODELS_S3_BUCKET: ${{ secrets.MODELS_S3_BUCKET }}
        run: |
          aws s3 cp models/model.pkl  s3://$MODELS_S3_BUCKET/models/model.pkl
          aws s3 cp models/scaler.pkl s3://$MODELS_S3_BUCKET/models/scaler.pkl
          echo "✅ Modelo y scaler subidos a S3"

      - name: Configurar credenciales AWS
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Subir modelo a S3
        if: github.ref == 'refs/heads/main'
        env:
          MODELS_S3_BUCKET: ${{ secrets.MODELS_S3_BUCKET }}
        run: |
          aws s3 cp models/model.pkl  s3://$MODELS_S3_BUCKET/models/model.pkl
          aws s3 cp models/scaler.pkl s3://$MODELS_S3_BUCKET/models/scaler.pkl
          echo "✅ Modelo y scaler subidos a S3"

      - name: Subir artefactos del modelo
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/*.pkl
            reports/metrics.json
            reports/*.png
          retention-days: 30

      - name: Subir MLflow runs
        if: ${{ github.event_name != 'pull_request' || env.RUN_INTEGRATION_TESTS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - name: Comentar métricas en PR
        if: github.event_name == 'pull_request' && env.RUN_INTEGRATION_TESTS == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const f1 = '${{ steps.metrics.outputs.f1 }}';
            const accuracy = '${{ steps.metrics.outputs.accuracy }}';
            const roc_auc = '${{ steps.metrics.outputs.roc_auc }}';
            const approved = parseFloat(f1) >= ${{ env.MIN_F1_SCORE }};
            
            const comment = `## 📊 Model Training Results
            
            | Metric | Value |
            |--------|-------|
            | **F1 Score** | ${f1} |
            | **Accuracy** | ${accuracy} |
            | **ROC AUC** | ${roc_auc} |
            
            **Status**: ${approved ? '✅ Approved' : '❌ Rejected'}
            **Threshold**: F1 ≥ ${{ env.MIN_F1_SCORE }}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

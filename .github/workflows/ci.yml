name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
      # Optional configuration for integration tests that require real model artifacts
      RUN_INTEGRATION_TESTS: 'false' # set to 'true' to download model artifacts from S3 before running tests
      MODELS_S3_BUCKET: joseph-mlops-pipeline-models
      MODEL_S3_KEY: models/model.pkl
      SCALER_S3_KEY: models/scaler.pkl
    permissions:
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      # Extraemos la versión del archivo para usarla en el CI
      - name: Read python version
        id: py-version
        run: echo "VERSION=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: Configurar Python {requirements.txt/PYTHON_VERSION}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.py-version.outputs.VERSION }}

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configure AWS credentials (for integration tests)
        if: env.RUN_INTEGRATION_TESTS == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Download model artifacts from S3 (optional)
        if: env.RUN_INTEGRATION_TESTS == 'true'
        run: |
          python - <<'PY'
          import boto3, os
          bucket = os.environ.get('MODELS_S3_BUCKET')
          model_key = os.environ.get('MODEL_S3_KEY')
          scaler_key = os.environ.get('SCALER_S3_KEY')
          os.makedirs('models', exist_ok=True)
          s3 = boto3.client('s3', region_name=os.environ.get('AWS_DEFAULT_REGION'))
          print('Downloading', model_key, 'and', scaler_key, 'from', bucket)
          s3.download_file(bucket, model_key, 'models/model.pkl')
          s3.download_file(bucket, scaler_key, 'models/scaler.pkl')
          print('Model artifacts downloaded')
          PY

      - name: Correr tests
        run: pytest tests/ -v

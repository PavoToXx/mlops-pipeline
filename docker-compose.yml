services:

  ml-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mlops-dev
    volumes:
      - .:/app                    # Tu código local montado en tiempo real
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      - mlflow
    networks:
      - mlops-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    networks:
      - mlops-net

networks:
  mlops-net:
    driver: bridge

volumes:
  mlflow-data: